random_state: 42

data:
  train: 'data/raw/train.csv'
  test: 'data/raw/test.csv'
  target: 'Irrigation_Need'
  id_col: 'id'
  num_classes: 3
  test_size: 0.2

model:
  objective: 'multi:softmax'
  eval_metric: 'mlogloss'
  num_boost_round: 5000
  early_stopping_rounds: 100
  tree_method: 'hist'
  device: 'cpu'
  n_jobs: -1
  verbose_eval: False

  search_space:
    learning_rate:
      low: 0.02
      high: 0.1
      log: true
    max_depth:
      low: 6
      high: 10
    min_child_weight:
      low: 1
      high: 80
    subsample:
      low: 0.7
      high: 1.0
    colsample_bytree:
      low: 0.7
      high: 1.0
    reg_alpha:
      low: 0.0
      high: 0.5
    reg_lambda:
      low: 0.0
      high: 5.0
    gamma:
      low: 0.0
      high: 0.5

optuna:
  study_name: 'irrigation_xgboost'
  storage: 'sqlite:///irrigation_study.db'
  n_trials: 100
  direction: 'maximize'

mlflow:
  tracking_uri: 'http://localhost:5000'
  experiment_name: 'irrigation_xgboost'

paths:
  models: 'models/'
  submissions: 'submissions/'
  mlruns: 'mlruns/'